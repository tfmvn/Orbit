services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      ORBIT_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../apps/web/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
